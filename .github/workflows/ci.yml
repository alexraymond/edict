name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            compiler: gcc
            cc: gcc-14
            cxx: g++-14
          - os: ubuntu-24.04
            compiler: clang
            cc: clang-18
            cxx: clang++-18
            extra_flags: "-stdlib=libc++"
          - os: windows-latest
            compiler: msvc

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.compiler }}

    steps:
      - uses: actions/checkout@v4

      - name: Install libc++ (Clang)
        if: matrix.compiler == 'clang'
        run: sudo apt-get install -y libc++-18-dev libc++abi-18-dev

      - name: Configure (Unix)
        if: runner.os != 'Windows'
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
          EXTRA: ${{ matrix.extra_flags }}
        run: |
          cmake -S . -B build \
            -DCMAKE_CXX_COMPILER="$CXX" \
            -DCMAKE_C_COMPILER="$CC" \
            -DCMAKE_CXX_FLAGS="$EXTRA" \
            -DEDICT_BUILD_TESTS=ON \
            -DEDICT_BUILD_EXAMPLES=ON

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -S . -B build -DEDICT_BUILD_TESTS=ON -DEDICT_BUILD_EXAMPLES=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Test (Unix)
        if: runner.os != 'Windows'
        run: ctest --test-dir build --output-on-failure

      - name: Test (Windows)
        if: runner.os == 'Windows'
        run: ctest --test-dir build --output-on-failure -C Release

  sanitizers:
    runs-on: ubuntu-24.04
    name: sanitizers (TSan + ASan)

    steps:
      - uses: actions/checkout@v4

      - name: Configure with TSan
        env:
          CC: gcc-14
          CXX: g++-14
        run: |
          cmake -S . -B build-tsan \
            -DCMAKE_CXX_COMPILER="$CXX" \
            -DCMAKE_C_COMPILER="$CC" \
            -DCMAKE_CXX_FLAGS="-fsanitize=thread -g" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=thread" \
            -DEDICT_BUILD_TESTS=ON

      - name: Build TSan
        run: cmake --build build-tsan

      - name: Test TSan
        run: ctest --test-dir build-tsan --output-on-failure

      - name: Configure with ASan + UBSan
        env:
          CC: gcc-14
          CXX: g++-14
        run: |
          cmake -S . -B build-asan \
            -DCMAKE_CXX_COMPILER="$CXX" \
            -DCMAKE_C_COMPILER="$CC" \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -g -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined" \
            -DEDICT_BUILD_TESTS=ON

      - name: Build ASan
        run: cmake --build build-asan

      - name: Test ASan
        run: ctest --test-dir build-asan --output-on-failure
